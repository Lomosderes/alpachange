<div class="content-capsule">
    <h2 class="section-header">Top Docentes</h2>
    
    <div class="list-group list-group-flush bg-transparent">
        {% for teacher in top_teachers %}
            <a href="{% url 'teacher_detail' teacher.id %}" class="list-group-item list-group-item-action bg-transparent border-0 px-0 py-3 mb-2" style="border-bottom: 1px solid var(--border-subtle) !important;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-bold text-dark" style="font-size: 1.05rem;">{{ teacher.first_name }} {{ teacher.last_name }}</div>
                        <small class="text-muted d-block fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 0.05em;">{{ teacher.department }}</small>
                    </div>
                    <div class="text-end">
                        <span class="badge rounded-pill px-3 py-2" style="background-color: var(--brand-success); font-size: 1rem; font-weight: 800;">
                            {{ teacher.average_rating|default:"0.0" }}
                        </span>
                    </div>
                </div>
            </a>
        {% empty %}
            <p class="text-muted small text-center py-4">Sin calificaciones aún.</p>
        {% endfor %}
    </div>
    
    <div class="mt-4">
        <a href="{% url 'teacher_list' %}" class="btn btn-primary w-100 rounded-pill fw-bold py-3 shadow-sm" style="background-color: var(--brand-primary); border: none;">
            Ver Directorio Completo
        </a>
    </div>

    <div class="mt-5 p-4 bg-light rounded-4 small text-muted border" style="border-style: dashed !important;">
        <h6 class="fw-bold text-dark mb-2"><i class="bi bi-shield-check text-success me-1"></i> Participación Segura</h6>
        100% anónimo y protegido.
    </div>
</div>
